name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-build:
    name: Full Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DEAI_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  profile-builds:
    name: Profile (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [smart-camera, industrial-gateway, robot-controller, mobile-edge, adaptive-edge]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.profile }}
        run: |
          cmake -B build -DEAI_PROFILE=${{ matrix.profile }}
          cmake --build build

  valgrind:
    name: Valgrind Memcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential valgrind

      - name: Build (Debug)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DEAI_BUILD_TESTS=ON
          cmake --build build -j$(nproc)

      - name: Run tests under Valgrind
        run: |
          for test in $(find build -name "eai_test_*" -o -name "test_*" -type f -executable 2>/dev/null); do
            echo "=== Valgrind: $(basename $test) ==="
            valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 \
              --track-origins=yes "$test" || true
          done

  report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [full-build, profile-builds, valgrind]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Weekly Report — EAI"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Full builds | ${{ needs.full-build.result }} |"
          echo "| Profile builds | ${{ needs.profile-builds.result }} |"
          echo "| Valgrind | ${{ needs.valgrind.result }} |"
          if [ "${{ needs.full-build.result }}" != "success" ] || \
             [ "${{ needs.profile-builds.result }}" != "success" ] || \
             [ "${{ needs.valgrind.result }}" != "success" ]; then
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo "✅ All checks passed"
