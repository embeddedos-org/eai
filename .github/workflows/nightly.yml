name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-build:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DEAI_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  profile-builds:
    name: Profile (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [smart-camera, industrial-gateway, robot-controller, mobile-edge, adaptive-edge]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.profile }}
        run: |
          cmake -B build -DEAI_PROFILE=${{ matrix.profile }}
          cmake --build build

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with AddressSanitizer + UndefinedBehaviorSanitizer
        run: |
          cmake -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DEAI_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-san -j$(nproc)

      - name: Run tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-san --output-on-failure

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [native-build, profile-builds, sanitizers]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Nightly Regression Report — EAI"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Native builds | ${{ needs.native-build.result }} |"
          echo "| Profile builds | ${{ needs.profile-builds.result }} |"
          echo "| Sanitizers | ${{ needs.sanitizers.result }} |"
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.profile-builds.result }}" != "success" ] || \
             [ "${{ needs.sanitizers.result }}" != "success" ]; then
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo "✅ All checks passed"
