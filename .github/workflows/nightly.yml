name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-build:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DEAI_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  profile-builds:
    name: Profile (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [smart-camera, industrial-gateway, robot-controller, mobile-edge, adaptive-edge]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.profile }}
        run: |
          cmake -B build -DEAI_PROFILE=${{ matrix.profile }}
          cmake --build build

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [native-build, profile-builds]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Nightly Regression Report — EAI"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Native builds | ${{ needs.native-build.result }} |"
          echo "| Profile builds | ${{ needs.profile-builds.result }} |"
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.profile-builds.result }}" != "success" ]; then
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo "✅ All checks passed"
