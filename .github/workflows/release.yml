name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          cmake -B build -DEAI_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            cc: gcc
            pkg: ""
          - arch: aarch64-linux
            cc: aarch64-linux-gnu-gcc
            pkg: gcc-aarch64-linux-gnu
          - arch: arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            pkg: gcc-arm-linux-gnueabihf
          - arch: riscv64-linux
            cc: riscv64-linux-gnu-gcc
            pkg: gcc-riscv64-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        if: matrix.pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Package
        run: |
          mkdir -p staging/include staging/lib
          find build -name "*.a" -exec cp {} staging/lib/ \;
          cp -r common/include/* staging/include/ 2>/dev/null || true
          cp -r framework/include/* staging/include/ 2>/dev/null || true
          cp -r min/include/* staging/include/ 2>/dev/null || true
          cp -r bci/include/* staging/include/ 2>/dev/null || true
          tar czf eai-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: eai-${{ matrix.arch }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ steps.version.outputs.tag }}" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          else
            CHANGES=$(git log --oneline --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: eai-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eAI ${{ steps.version.outputs.tag }}"
          body: |
            ## eAI ${{ steps.version.outputs.tag }}

            ### Libraries
            | Archive | Target |
            |---|---|
            | `eai-*-x86_64-linux.tar.gz` | x86_64 Linux |
            | `eai-*-aarch64-linux.tar.gz` | AArch64 (RPi 4/5, Jetson) |
            | `eai-*-arm-linux-gnueabihf.tar.gz` | ARM (RPi 3, BeagleBone) |
            | `eai-*-riscv64-linux.tar.gz` | RISC-V 64 |

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: |
            *.tar.gz
            SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') }}
